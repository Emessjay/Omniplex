name: CI

# Runs the full Vitest suite + a production build on every push to main and
# every pull request. No secrets required: the app is built to compile and
# test without Supabase env (lazy/memoized clients, non-throwing env checks),
# so CI needs no configuration.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests first — fast (~10s) feedback before the slower build.
      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
