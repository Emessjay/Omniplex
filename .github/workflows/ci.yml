name: CI

# Two gates on every push to main and every PR:
#  - test + build: the full Vitest suite + a production build (no secrets — the
#    app builds/tests without Supabase env by design).
#  - migrations: apply EVERY migration to a real, clean Postgres and re-run for
#    idempotency. Vitest mocks Supabase, so it can't catch a SQL migration that
#    fails against real Postgres (e.g. a CREATE OR REPLACE VIEW that reorders
#    columns) — this job does, before such a bug ever reaches a deploy.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests first — fast (~10s) feedback before the slower build.
      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  migrations:
    name: migrations (clean DB + idempotency)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omniplex
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the steps run.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI-ONLY: stub the Supabase-provided primitives. The migrations reference
      # the `auth` schema (`auth.users` FK target + `auth.uid()` RLS) and the
      # predefined `anon`/`authenticated` roles (GRANT targets / RLS `to ...`),
      # all of which Supabase provides in prod but vanilla postgres:16 does not.
      # This mimics just enough for the migrations to apply on a clean DB.
      # (migrate.mjs must NOT create these — Supabase owns them in production.)
      - name: Bootstrap Supabase primitives (CI stub)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d omniplex -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists auth;
          create table if not exists auth.users (id uuid primary key);
          create or replace function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          do $$ begin
            if not exists (select from pg_roles where rolname = 'anon') then create role anon nologin; end if;
            if not exists (select from pg_roles where rolname = 'authenticated') then create role authenticated nologin; end if;
          end $$;
          SQL

      # Applies every supabase/migrations/*.sql to a clean DB via scripts/migrate.mjs
      # (the same runner Railway's start command uses). Fails the build if any
      # migration errors against real Postgres — the gate that would have caught
      # the leaderboard-view column-order bug before deploy.
      - name: Apply all migrations to a clean DB
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/omniplex
        run: node scripts/migrate.mjs

      # Forward-only + schema_migrations-tracked → a second run must be a clean
      # no-op. Catches non-idempotent migrations (e.g. a missing IF NOT EXISTS).
      - name: Re-run to prove idempotency
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/omniplex
        run: node scripts/migrate.mjs
